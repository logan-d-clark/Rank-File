<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#2d5a3d" rx="80"/>

  <!-- Center emblem - stylized chevron with star -->
  <g transform="translate(256, 256)">
    <!-- Outer frame -->
    <rect x="-120" y="-160" width="240" height="320" fill="none" stroke="#d4af37" stroke-width="12" rx="8"/>

    <!-- Three chevrons stacked -->
    <path d="M-80,60 L0,-20 L80,60 L80,80 L0,0 L-80,80 Z" fill="#d4af37"/>
    <path d="M-80,20 L0,-60 L80,20 L80,40 L0,-40 L-80,40 Z" fill="#d4af37"/>
    <path d="M-80,-20 L0,-100 L80,-20 L80,0 L0,-80 L-80,0 Z" fill="#d4af37"/>

    <!-- Center star -->
    <g transform="translate(0, -40)">
      <path d="M0,-30 L7,-9 L30,-9 L12,4 L18,27 L0,14 L-18,27 L-12,4 L-30,-9 L-7,-9 Z" fill="#ffffff"/>
    </g>

    <!-- Bottom rocker -->
    <path d="M-90,100 Q0,140 90,100 L90,120 Q0,160 -90,120 Z" fill="#d4af37"/>
  </g>

  <!-- Text at bottom -->
  <text x="256" y="460" text-anchor="middle" fill="#d4af37" font-family="sans-serif" font-size="48" font-weight="bold">RANK FILE</text>
</svg>
